name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  nox:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        session: [mypy, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install nox
      - run: nox -s ${{ matrix.session }}
